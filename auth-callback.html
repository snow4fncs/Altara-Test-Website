<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in — Altara</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { margin: 0; background: #0C0D10; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Outfit', sans-serif; color: rgba(237,232,223,0.5); font-size: 13px; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  Signing in…
  <script>
    const sb = supabase.createClient(
      'https://qhyactfkoumechqkwfdr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoeWFjdGZrb3VtZWNocWt3ZmRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzg0NDcsImV4cCI6MjA5NDgxNDQ0N30.2MLMZewBbq8B2TpaBLIyJQPW-ixrmC8dqROZWhmZl_0',
      { auth: { flowType: 'implicit' } }
    );

    async function handleCallback() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const search = new URLSearchParams(window.location.search);

      // ── Case 1: tokens in hash (implicit flow) ──
      const access_token = hash.get('access_token');
      const refresh_token = hash.get('refresh_token');
      if (access_token && refresh_token) {
        await sb.auth.setSession({ access_token, refresh_token });
        window.location.href = hash.get('type') === 'recovery' ? '/account.html?reset=1' : '/account.html';
        return;
      }

      // ── Case 2: token_hash in query params (new Supabase email format) ──
      const token_hash = search.get('token_hash');
      const type = search.get('type');
      if (token_hash && type) {
        const { error } = await sb.auth.verifyOtp({ token_hash, type });
        if (!error) {
          window.location.href = type === 'recovery' ? '/account.html?reset=1' : '/account.html';
          return;
        }
      }

      // ── Case 3: PKCE code ──
      const code = search.get('code');
      if (code) {
        await sb.auth.exchangeCodeForSession(code);
        window.location.href = '/account.html';
        return;
      }

      window.location.href = '/account.html';
    }

    handleCallback();
  </script>
</body>
</html>
